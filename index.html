<!DOCTYPE html>
<html>
<head>
<title>A Carta</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #050505, #000814);
    font-family: Georgia, serif;
    overflow-x: hidden;
}

/* 🌌 estrelas */
.stars span {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    animation: starMove linear infinite;
}

@keyframes starMove {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-1000px); opacity: 0; }
}

/* 💌 botão */
.envelope {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.botao {
    padding: 15px 30px;
    background: #ff4d6d;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    transition: 0.3s;
}

.botao:hover {
    transform: scale(1.1);
}

/* 📜 carta */
.carta {
    display: none;
    max-width: 600px;
    margin: 100px auto;
    padding: 40px;
    background: #111;
    border-radius: 14px;
    color: white;
    box-shadow: 0 0 40px rgba(255,0,80,0.3);
    animation: aparecer 1s ease;
}

@keyframes aparecer {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

h1 {
    text-align: center;
    color: #ff4d6d;
}

.assinatura {
    text-align: right;
    margin-top: 20px;
    color: #ff4d6d;
}

/* 💖 corações */
.heart {
    position: fixed;
    color: red;
    animation: subir 2s linear forwards;
    pointer-events: none;
}

@keyframes subir {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-200px); opacity: 0; }
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="envelope">
    <button class="botao" onclick="abrirCarta()">Abrir carta 💌</button>
</div>

<div class="carta" id="carta">
    <h1>A Carta..</h1>
    <p id="texto"></p>
    <div class="assinatura">- Vaz</div>
</div>

<script>
// ⭐ estrelas
for (let i = 0; i < 100; i++) {
    let star = document.createElement("span");
    star.style.left = Math.random()*100 + "%";
    star.style.top = Math.random()*100 + "%";
    star.style.animationDuration = (Math.random()*3+2)+"s";
    document.body.appendChild(star);
}

// ✍️ texto completo
const texto = `O Mar, oh grandioso mar,
faz com que eu te ame cada vez mais.
Minha chama por ti é como as ondas do Sul: constante,
intensa como os ventos fortes de uma grande montanha.

Eu sei… poderia ser menos —
pensar menos, sentir menos —
mas não me convém esconder quem sou
nem o que sinto.

Olhando para o céu estrelado,
pego-me pensando em um amor passageiro…
Eu não acreditava em tuas palavras,
pois era cedo — e eu tinha medo.

Gosto quando falas de teus sentimentos,
quando te sentes seguro para me contar
teus maiores medos e segredos.
Isso me mostra que não há mal algum em ti.

É impressionante a confiança que tens em mim
em tão pouco tempo —
espanta-me tamanha determinação
em laços ainda tão jovens e delicados.

O que quero dizer é…
o amor que sinto por ti não é raso:
é explosivo, intenso, verdadeiro e cúmplice.

Nunca imaginei mergulhar
nesse mar profundo que me apresentaste.

Eu te agradeço.
Eu te amo —
amo esse amar novo, desconhecido,
que agora me pertence.`;

// ✍️ efeito digitando
let i = 0;
function escrever() {
    if (i < texto.length) {
        document.getElementById("texto").innerHTML += texto.charAt(i).replace(/\n/g,"<br>");
        i++;
        setTimeout(escrever, 25);
    }
}

// 💌 abrir carta
function abrirCarta() {
    document.querySelector(".envelope").style.display = "none";
    document.getElementById("carta").style.display = "block";
    escrever();
}

// 💖 corações no clique
document.addEventListener("click", function(e){
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤";
    heart.style.left = e.clientX + "px";
    heart.style.top = e.clientY + "px";
    document.body.appendChild(heart);

    setTimeout(()=> heart.remove(), 2000);
});
</script>

</body>
</html>
