<!DOCTYPE html>
<html>
<head>
<title>A Carta</title>

<style>
body {
    margin: 0;
    background: linear-gradient(#050505, #000814);
    font-family: Georgia, serif;
    overflow-x: hidden;
}

/* 🌌 ESTRELAS */
.stars span {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    box-shadow: 0 0 6px white;
    animation: starMove linear infinite;
}

@keyframes starMove {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-1000px); opacity: 0; }
}

/* 🌊 MAR */
.wave {
    position: fixed;
    bottom: 0;
    width: 200%;
    height: 200px;
    background: linear-gradient(to top, rgba(80,0,120,0.5), transparent);
    border-radius: 50%;
    animation: waveMove 10s linear infinite;
}

.wave:nth-child(2) {
    animation-duration: 15s;
    opacity: 0.6;
}

@keyframes waveMove {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

/* 💌 BOTÃO */
.envelope {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.botao {
    padding: 15px 30px;
    background: linear-gradient(45deg, #ff4d6d, #8a2be2);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    transition: 0.3s;
}

.botao:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #8a2be2;
}

/* 📜 CARTA */
.carta {
    display: none;
    max-width: 600px;
    margin: 100px auto;
    padding: 40px;
    background: rgba(20,20,30,0.95);
    border-radius: 14px;
    color: #eee;
    box-shadow: 0 0 50px rgba(138,43,226,0.3);
    border: 1px solid rgba(138,43,226,0.2);
    animation: aparecer 1s ease;
}

@keyframes aparecer {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

h1 {
    text-align: center;
    color: #c77dff;
}

/* ✨ destaque */
.destaque {
    color: #c77dff;
    text-shadow: 0 0 8px #8a2be2;
}

.assinatura {
    text-align: right;
    margin-top: 20px;
    color: #c77dff;
}

/* 💖 corações */
.heart {
    position: fixed;
    color: #ff4d6d;
    animation: subir 2s linear forwards;
    pointer-events: none;
}

@keyframes subir {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-200px); opacity: 0; }
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="wave"></div>
<div class="wave"></div>

<div class="envelope">
    <button class="botao" onclick="abrirCarta()">Abrir carta 💌</button>
</div>

<div class="carta" id="carta">
    <h1>A Carta..</h1>
    <p id="texto"></p>
    <div class="assinatura">- Vaz</div>
</div>

<script>
// ⭐ estrelas
for (let i = 0; i < 120; i++) {
    let star = document.createElement("span");
    star.style.left = Math.random()*100 + "%";
    star.style.top = Math.random()*100 + "%";
    star.style.animationDuration = (Math.random()*3+2)+"s";
    document.body.appendChild(star);
}

// ✍️ texto com destaque
const texto = `O Mar, oh grandioso mar,
faz com que eu te ame cada vez mais.

Minha chama por ti é como as ondas do Sul: constante,
intensa como os ventos fortes de uma grande montanha.

Eu sei… poderia ser menos —
pensar menos, sentir menos —

mas não me convém esconder quem sou
nem o que sinto.

Olhando para o céu estrelado,
pego-me pensando em um amor passageiro…

Gosto quando falas de teus sentimentos,
quando te sentes seguro para me contar teus medos.

O que quero dizer é…

<span class="destaque">o amor que sinto por ti não é raso</span>:
é explosivo, intenso, verdadeiro e cúmplice.

<span class="destaque">Eu te amo</span> —
amo esse amar novo,
que agora me pertence.`;

// ✍️ efeito digitando
let i = 0;
function escrever() {
    if (i < texto.length) {
        document.getElementById("texto").innerHTML += texto.charAt(i).replace(/\n/g,"<br>");
        i++;
        setTimeout(escrever, 25);
    }
}

// 💌 abrir carta
function abrirCarta() {
    document.querySelector(".envelope").style.display = "none";
    document.getElementById("carta").style.display = "block";
    escrever();
}

// 💖 corações
document.addEventListener("click", function(e){
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤";
    heart.style.left = e.clientX + "px";
    heart.style.top = e.clientY + "px";
    document.body.appendChild(heart);

    setTimeout(()=> heart.remove(), 2000);
});
</script>

</body>
</html>
