<!DOCTYPE html>
<html>
<head>
<title>A Carta</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #050505, #000814);
    font-family: Georgia, serif;
    overflow-x: hidden;
}

/* 🌌 estrelas */
.stars span {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    animation: starMove linear infinite;
}

@keyframes starMove {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-1000px); opacity: 0; }
}

/* 💌 envelope */
.envelope {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.botao {
    padding: 15px 30px;
    background: #ff4d6d;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
}

/* 📜 carta escondida */
.carta {
    display: none;
    max-width: 600px;
    margin: 100px auto;
    padding: 40px;
    background: #111;
    border-radius: 14px;
    color: white;
    box-shadow: 0 0 40px rgba(255,0,80,0.3);
}

/* 💖 corações */
.heart {
    position: fixed;
    color: red;
    animation: subir 2s linear forwards;
}

@keyframes subir {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-200px); opacity: 0; }
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="envelope">
    <button class="botao" onclick="abrirCarta()">Abrir carta 💌</button>
</div>

<div class="carta" id="carta">
<h1>A Carta..</h1>
<p id="texto"></p>
<div>- Vaz</div>
</div>

<script>
// ⭐ estrelas
for (let i = 0; i < 100; i++) {
    let star = document.createElement("span");
    star.style.left = Math.random()*100 + "%";
    star.style.top = Math.random()*100 + "%";
    star.style.animationDuration = (Math.random()*3+2)+"s";
    document.querySelector(".stars").appendChild(star);
}

// ✍️ texto digitando
const texto = `O Mar, oh grandioso mar,
faz com que eu te ame cada vez mais...

Eu te amo.`;

let i = 0;
function escrever() {
    if (i < texto.length) {
        document.getElementById("texto").innerHTML += texto.charAt(i);
        i++;
        setTimeout(escrever, 30);
    }
}

// 💌 abrir carta
function abrirCarta() {
    document.querySelector(".envelope").style.display = "none";
    document.getElementById("carta").style.display = "block";
    escrever();
}

// 💖 clique corações
document.addEventListener("click", function(e){
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤";
    heart.style.left = e.clientX + "px";
    heart.style.top = e.clientY + "px";
    document.body.appendChild(heart);

    setTimeout(()=> heart.remove(), 2000);
});
</script>

</body>
</html>
